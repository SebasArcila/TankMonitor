# docker-compose.yml orquesta VARIOS contenedores que trabajan juntos
# como un solo sistema. Aquí definimos dos "servicios": la base de datos
# y el backend, y la RED interna que les permite hablarse entre sí por
# nombre (en vez de por IP, que cambiaría cada vez que se recrea un
# contenedor).
version: '3.9'

services:
  # -----------------------------------------------------------------
  # Servicio: postgres
  # -----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      # Estas variables las lee automáticamente la imagen oficial de
      # Postgres para crear el usuario/base de datos al primer arranque.
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tankmonitor
    ports:
      # "host:contenedor" — exponemos el 5432 también hacia tu máquina
      # por si quieres conectarte con un cliente SQL externo (ej: DBeaver)
      # mientras desarrollas.
      - "5432:5432"
    volumes:
      # Monta el schema.sql para que se ejecute automáticamente la
      # PRIMERA vez que se crea el volumen de datos (la imagen oficial
      # corre todo lo que encuentre en /docker-entrypoint-initdb.d/).
      - ../database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
      # "postgres_data" es un VOLUMEN NOMBRADO (ver abajo): asegura que
      # los datos sobrevivan aunque el contenedor se borre y se vuelva a
      # crear.
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Docker Compose puede esperar a que Postgres esté REALMENTE listo
      # (no solo "iniciado") antes de arrancar el backend, usando este
      # healthcheck.
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------------
  # Servicio: backend
  # -----------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        # No basta con "esperar a que el contenedor exista": esperamos a
        # que el healthcheck de arriba pase, para no fallar por conectar
        # demasiado pronto.
        condition: service_healthy
    environment:
      # Dentro de la red de docker-compose, "postgres" (el nombre del
      # servicio de arriba) funciona como si fuera el hostname de esa
      # máquina. Por eso la cadena de conexión usa "postgres" en vez de
      # "localhost".
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/tankmonitor
    ports:
      - "8080:8080"

# Volumen nombrado: Docker lo administra internamente y persiste aunque
# borres y recrees los contenedores con "docker compose down".
volumes:
  postgres_data:
